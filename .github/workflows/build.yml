name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe: dist/app

          - os: windows-latest
            exe: dist/app.exe

          - os: macos-latest
            exe: dist/app

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint
      run: make lint

    - name: Test
      run: make test

    - name: Package
      run: make dist

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: app
        path: ${{ matrix.exe }}
        archive: false
